<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V2.0 Free Anime,Movies and Manga Website</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─── Background Layers ─── */
    .bg-simple {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    }

    .glass-layer {
      position: fixed;
      inset: 0;
      z-index: -1;
      backdrop-filter: blur(100px);
      background: rgba(255,255,255,0.02);
    }

    /* ─── Floating Orbs ─── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      z-index: -1;
      animation: float 10s ease-in-out infinite;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: #6366f1;
      top: -100px; left: -100px;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: #ec4899;
      bottom: -50px; right: -50px;
      animation-delay: -5s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* ─── Layout ─── */
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
      font-size: 1rem;
    }

    /* ─── Hub Grid ─── */
    .hub {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      padding: 0;
    }

    /* ─── Site Cards (Glassmorphism) ─── */
    .site-card {
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .site-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .site-card.expanded {
      position: fixed;
      top: 5%;
      left: 5%;
      width: 90%;
      height: 90%;
      z-index: 1000;
      box-shadow: 0 0 80px rgba(0,0,0,0.9);
      transform: none;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .site-header span {
      font-weight: 600;
      font-size: 15px;
      color: rgba(255,255,255,0.9);
    }

    .site-header a {
      color: #a78bfa;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .site-header a:hover { color: #c4b5fd; }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .expand-btn, .close-btn {
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      padding: 6px 14px;
      border-radius: 8px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.2s;
    }
    .expand-btn:hover, .close-btn:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }

    .close-btn { display: none; }
    .site-card.expanded .close-btn { display: inline; }
    .site-card.expanded .expand-btn { display: none; }

    iframe {
      width: 100%;
      height: 220px;
      border: none;
      background: #fff;
      display: block;
    }

    .site-card.expanded iframe {
      height: calc(100% - 55px);
    }

    /* ─── Overlay ─── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 999;
    }
    .overlay.active { display: block; }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .site-card.expanded {
        top: 2%;
        left: 2%;
        width: 96%;
        height: 96%;
      }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-simple"></div>
  <div class="glass-layer"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeAll()"></div>

  <!-- Content -->
  <div class="container">
    <h1>FREE MOVIES,ANIME AND MANGA WEBSITE</h1>
    <p class="subtitle">Click Expand to preview, or Open ↗ to visit directly
    (USE BRAVE BROWSER FOR BETTER EXPERIENCE)</p>
    <div class="hub" id="hub"></div>
  </div>
<link rel="manifest" href="manifest.json">
  <script>
    const sites = [
      { name: 'ANIME 1', url: 'https://anikai.to/browser' },
      { name: 'ANIME 2', url: 'https://animotvslash.org/' },
      { name: 'ANIME 3', url: 'https://aniwatchtv.com.ro/' },
      { name: 'MOVIES 1', url: 'https://popcornfilmz.com/' },
      { name: 'MOVIES 2', url: 'https://streamex.net/' },
      { name: 'Manga 1', url: 'https://www.mangakakalot.gg/' },
        { name: 'Manga 2', url: 'https://asurascans.com/' }
        
    ];

    function createCard(site) {
      const card = document.createElement('div');
      card.className = 'site-card';
      card.innerHTML = `
        <div class="site-header">
          <span>${site.name}</span>
          <div class="actions">
            <button class="expand-btn" onclick="expand(this)">Expand</button>
            <button class="close-btn" onclick="closeAll()">Close</button>
            <a href="${site.url}" target="_blank" rel="noopener">Open ↗</a>
          </div>
        </div>
       <iframe 
  src="${site.url}" 
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
  loading="lazy"
  onerror="this.style.display='none'; this.parentElement.innerHTML += '<p style=color:white;padding:10px>Preview not available</p>';">
</iframe>
      `;
      return card;
    }

    function expand(btn) {
      closeAll();
      const card = btn.closest('.site-card');
      card.classList.add('expanded');
      document.getElementById('overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeAll() {
      document.querySelectorAll('.site-card.expanded').forEach(c => c.classList.remove('expanded'));
      document.getElementById('overlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    // Build the hub
    const hub = document.getElementById('hub');
    sites.forEach(site => hub.appendChild(createCard(site)));

    // Close on Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeAll();
    });
  </script>

</body>
</html>
